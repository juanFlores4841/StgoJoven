<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Mi Perfil | Stgo Joven</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <style>
    body {
      background: #f3f4f6;
    }

    .gradient-bg {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
    }

    .card-hover {
      transition: all 0.3s ease;
    }

    .card-hover:hover {
      transform: translateY(-4px);
    }
  </style>

</head>

<body>

  <!-- NAVBAR -->
  <nav class="bg-white shadow-md">

    <div class="container mx-auto px-6 py-4 flex justify-between items-center">

      <!-- LOGO -->
      <div>

        <h1 class="text-2xl font-bold text-blue-600">
          Stgo Joven
        </h1>

      </div>

      <!-- MENU -->
      <div class="flex items-center gap-6">

        <a href="index.html" class="text-gray-700 hover:text-blue-600 transition font-medium">

          Inicio

        </a>

        <a href="perfil.html" class="text-blue-600 font-semibold">

          Mi Perfil

        </a>

        <button id="btn-logout" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-xl transition">

          <i class="fas fa-sign-out-alt mr-2"></i>
          Cerrar sesión

        </button>

      </div>

    </div>

  </nav>

  <!-- MAIN -->
  <main class="container mx-auto px-6 py-12">

    <!-- PERFIL -->
    <section class="mb-12">

      <div id="perfil-container">

      </div>

    </section>

    <!-- MIS CURSOS -->
    <section>

      <div class="flex items-center justify-between mb-8">

        <h2 class="text-3xl font-bold text-gray-800">

          Mis Cursos

        </h2>

      </div>

      <div id="mis-cursos-container" class="grid md:grid-cols-2 xl:grid-cols-3 gap-8">

      </div>

    </section>

  </main>

  <!-- SCRIPT -->
  <script>

    // ===============================
    // CONFIG
    // ===============================

    const urlBase = "http://localhost:3000";

    // ===============================
    // VALIDAR SESIÓN
    // ===============================

    const token = localStorage.getItem("token");

    if (!token) {

      window.location.href = "index.html";
    }

    // ===============================
    // CARGAR PERFIL
    // ===============================

    const cargarPerfil = async () => {

      try {

        const respuesta = await fetch(
          `${urlBase}/api/usuarios/perfil`,
          {
            headers: {
              "Authorization": `Bearer ${token}`
            }
          }
        );

        const usuario = await respuesta.json();

        const container = document.getElementById("perfil-container");

        container.innerHTML = `

        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">

          <!-- HEADER -->
          <div class="gradient-bg p-10 text-white">

            <div class="flex flex-col md:flex-row items-center gap-8">

              <!-- AVATAR -->
              <div class="w-32 h-32 rounded-full bg-white/20 border-4 border-white flex items-center justify-center text-5xl font-bold">

                ${usuario.nombre.charAt(0)}${usuario.apellido.charAt(0)}

              </div>

              <!-- INFO -->
              <div>

                <h2 class="text-4xl font-bold">

                  ${usuario.nombre} ${usuario.apellido}

                </h2>

                <p class="text-xl text-white/90 mt-2">

                  ${usuario.email}

                </p>

                <div class="flex flex-wrap gap-3 mt-5">

                  <span class="bg-white/20 px-4 py-2 rounded-full text-sm">

                    Miembro Stgo Joven

                  </span>

                  <span class="bg-green-500 px-4 py-2 rounded-full text-sm">

                    Activo

                  </span>

                </div>

              </div>

            </div>

          </div>

          <!-- DATOS -->
          <div class="p-10">

            <div class="grid md:grid-cols-2 gap-8">

              <!-- TELÉFONO -->
              <div class="bg-gray-50 rounded-2xl p-6 shadow-sm card-hover">

                <div class="flex items-center gap-3 mb-3">

                  <i class="fas fa-phone text-blue-600 text-xl"></i>

                  <h3 class="font-bold text-gray-700 text-lg">

                    Teléfono

                  </h3>

                </div>

                <p class="text-gray-800 text-lg">

                  ${usuario.telefono || "No registrado"}

                </p>

              </div>

              <!-- FECHA -->
              <div class="bg-gray-50 rounded-2xl p-6 shadow-sm card-hover">

                <div class="flex items-center gap-3 mb-3">

                  <i class="fas fa-calendar text-blue-600 text-xl"></i>

                  <h3 class="font-bold text-gray-700 text-lg">

                    Fecha de nacimiento

                  </h3>

                </div>

                <p class="text-gray-800 text-lg">

  ${usuario.fecha_nacimiento
            ? new Date(usuario.fecha_nacimiento)
              .toLocaleDateString("es-CL")
            : "No registrada"
          }

</p>

              </div>

            </div>

            <!-- ESTADÍSTICAS -->
            <div class="grid grid-cols-2 gap-8 mt-10">

              <div class="bg-blue-50 rounded-2xl p-8 text-center">

                <h3 id="cantidad-cursos"
                  class="text-5xl font-bold text-blue-600">

                  0

                </h3>

                <p class="text-gray-700 mt-3 text-lg">

                  Cursos inscritos

                </p>

              </div>

              <div class="bg-green-50 rounded-2xl p-8 text-center">

                <h3 class="text-5xl font-bold text-green-600">

                  100%

                </h3>

                <p class="text-gray-700 mt-3 text-lg">

                  Perfil completo

                </p>

              </div>

            </div>

          </div>

        </div>
        `;

      } catch (error) {

        console.error(error);
      }
    };

    // ===============================
    // CARGAR CURSOS
    // ===============================

    const cargarMisCursos = async () => {

      try {

        const respuesta = await fetch(
          `${urlBase}/api/cursos/mis-cursos`,
          {
            headers: {
              "Authorization": `Bearer ${token}`
            }
          }
        );

        const cursos = await respuesta.json();

        const container = document.getElementById("mis-cursos-container");

        container.innerHTML = "";

        // ESTADÍSTICA
        const cantidadCursos = document.getElementById("cantidad-cursos");

        if (cantidadCursos) {

          cantidadCursos.textContent = cursos.length;
        }

        // SIN CURSOS
        if (cursos.length === 0) {

          container.innerHTML = `

          <div class="bg-white rounded-2xl p-10 shadow-md col-span-full text-center">

            <i class="fas fa-book-open text-5xl text-gray-300 mb-5"></i>

            <h3 class="text-2xl font-bold text-gray-700 mb-2">

              Aún no tienes cursos inscritos

            </h3>

            <p class="text-gray-500">

              Explora los cursos disponibles en Stgo Joven.

            </p>

          </div>
          `;

          return;
        }

        // RENDER CURSOS
        cursos.forEach(curso => {

          container.innerHTML += `

          <div class="bg-white rounded-3xl shadow-lg overflow-hidden card-hover">

            <!-- TOP -->
            <div class="gradient-bg h-3"></div>

            <div class="p-8">

              <div class="flex items-center gap-4 mb-5">

                <div class="w-14 h-14 rounded-2xl bg-blue-100 flex items-center justify-center">

                  <i class="fas fa-graduation-cap text-blue-600 text-2xl"></i>

                </div>

                <div>

                  <h3 class="text-2xl font-bold text-gray-800">

                    ${curso.nombre}

                  </h3>

                </div>

              </div>

              <p class="text-gray-600 mb-6 leading-relaxed">

                ${curso.descripcion}

              </p>

              <div class="flex items-center justify-between">

                <span class="bg-blue-100 text-blue-700 px-4 py-2 rounded-full text-sm font-semibold">

  ${curso.fecha
              ? new Date(curso.fecha)
                .toLocaleDateString("es-CL")
              : "Sin fecha"
            }

</span>

                <span class="text-green-600 font-semibold">

                  Inscrito

                </span>

              </div>

            </div>

          </div>
          `;
        });

      } catch (error) {

        console.error(error);
      }
    };

    // ===============================
    // LOGOUT
    // ===============================

    const btnLogout = document.getElementById("btn-logout");

    btnLogout.addEventListener("click", () => {

      localStorage.removeItem("token");
      localStorage.removeItem("usuario");

      window.location.href = "index.html";
    });

    // ===============================
    // INICIAR
    // ===============================

    cargarPerfil();
    cargarMisCursos();

  </script>

</body>

</html>
